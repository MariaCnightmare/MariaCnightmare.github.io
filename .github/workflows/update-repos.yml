name: Update repos.json

on:
  push:
    branches: ["main"]
  workflow_dispatch:
  schedule:
    - cron: "15 1 * * *" # UTC 01:15 = JST 10:15

permissions:
  contents: write

concurrency:
  group: update-repos-json
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate repos.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          ./tools/update_repos.sh

      - name: Commit & Push if changed
        run: |
          set -euo pipefail
          if git diff --quiet -- data/repos.json; then
            echo "No changes in data/repos.json"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/repos.json
          git commit -m "chore: update repos.json"
          git push
