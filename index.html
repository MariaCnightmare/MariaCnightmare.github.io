<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>MariaCnightmare | GitHub Pages</title>
  <meta name="description" content="APIron-lab / 個人開発ポータル" />
  <style>
    :root { color-scheme: light dark; }
    body { margin: 0; font-family: system-ui, -apple-system, Segoe UI, Roboto, "Noto Sans JP", sans-serif; }
    .wrap { max-width: 980px; margin: 0 auto; padding: 56px 20px; }
    header { display:flex; align-items:baseline; justify-content:space-between; gap:16px; flex-wrap:wrap; }
    h1 { margin:0; font-size: 30px; letter-spacing: .2px; }
    .tag { opacity: .75; font-size: 14px; }
    .card { border: 1px solid color-mix(in srgb, currentColor 18%, transparent); border-radius: 16px; padding: 18px; margin-top: 16px; }
    .grid { display:grid; gap: 12px; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); margin-top: 12px; }
    a { color: inherit; text-decoration:none; }
    a:hover { text-decoration:underline; }
    .muted { opacity: .8; }
    footer { margin-top: 40px; opacity: .7; font-size: 13px; }
    .btn { display:inline-block; padding:10px 12px; border:1px solid color-mix(in srgb, currentColor 22%, transparent);
      border-radius: 12px; }
    .pill { display:inline-block; font-size: 12px; padding: 2px 8px; border-radius: 999px;
      border: 1px solid color-mix(in srgb, currentColor 18%, transparent); opacity: .85; }
    .row { display:flex; gap:8px; flex-wrap:wrap; margin-top: 10px; align-items:center; }
    .desc { margin-top: 8px; opacity: .92; font-size: 14px; line-height: 1.55; }
    .meta { margin-top: 10px; display:flex; gap:10px; flex-wrap:wrap; opacity: .75; font-size: 12px; }
    input[type="search"]{ width: 100%; padding: 10px 12px; border-radius: 12px;
      border: 1px solid color-mix(in srgb, currentColor 18%, transparent); background: transparent; color: inherit; }
    code { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace; font-size: .95em; }
    .bar { display:flex; gap:10px; flex-wrap:wrap; margin-top: 12px; }
    .right { margin-left:auto; opacity:.75; font-size:12px; align-self:center; }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>MariaCnightmare</h1>
      <div class="tag">APIron-lab / 個人開発ポータル</div>
    </header>

    <div class="card">
      <div class="muted">ここは「全部の入口」です。各プロジェクトへ最短導線で案内します。</div>
      <div class="bar">
        <a class="btn" href="https://github.com/MariaCnightmare">GitHub Profile</a>
        <a class="btn" href="https://github.com/MariaCnightmare?tab=repositories">Repositories</a>
        <div class="right" id="lastUpdated"></div>
      </div>
    </div>

    <div class="card">
      <strong>Projects</strong>
      <div class="muted" style="margin-top:8px;">更新が多い順に表示（fork/archived除外）。</div>

      <div style="margin-top:12px;">
        <input id="q" type="search" placeholder="検索：repo名 / 説明 / 言語 / topics" autocomplete="off" />
      </div>

      <div id="projects" class="grid" style="margin-top:14px;"></div>

      <div id="hint" class="muted" style="margin-top:10px; display:none;">
        <div><strong>data/repos.json が見つかりません。</strong></div>
        <div style="margin-top:6px;">ローカルで <code>./tools/update_repos.sh</code> を実行して commit/push してください。</div>
      </div>
    </div>

    <footer>
      © MariaCnightmare — Built with GitHub Pages.
    </footer>
  </div>

  <script>
    const $projects = document.getElementById("projects");
    const $q = document.getElementById("q");
    const $hint = document.getElementById("hint");
    const $last = document.getElementById("lastUpdated");

    function esc(s){ return (s ?? "").toString()
      .replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;"); }

    function card(r){
      const topics = (r.topics || []).slice(0,6).map(t => `<span class="pill">${esc(t)}</span>`).join(" ");
      const lang = r.language ? `<span class="pill">${esc(r.language)}</span>` : "";
      const stars = typeof r.stargazers_count === "number" ? `★ ${r.stargazers_count}` : "";
      const updated = r.updated_at ? `Updated: ${r.updated_at.slice(0,10)}` : "";
      const homepage = r.homepage ? `<a class="pill" href="${esc(r.homepage)}">Demo</a>` : "";

      return `
        <div class="card" style="margin:0;">
          <strong><a href="${esc(r.html_url)}">${esc(r.name)}</a></strong>
          ${r.description
            ? `<div class="desc">${esc(r.description)}</div>`
            : `<div class="desc muted">（説明が未設定です。repo description を入れると一気に映えます。）</div>`}
          <div class="row">${lang} ${homepage} ${topics}</div>
          <div class="meta"><span>${esc(stars)}</span><span>${esc(updated)}</span></div>
        </div>
      `;
    }

    function render(items, query){
      const q = (query || "").trim().toLowerCase();
      const filtered = !q ? items : items.filter(r => {
        const hay = [r.name, r.description, r.language, ...(r.topics || [])].join(" ").toLowerCase();
        return hay.includes(q);
      });
      $projects.innerHTML = filtered.map(card).join("");
    }

    async function main(){
      try{
        const res = await fetch("./data/repos.json", { cache: "no-store" });
        if(!res.ok) throw new Error("repos.json not found");
        const data = await res.json();
        const items = data.items || [];
        render(items, "");
        $q.addEventListener("input", () => render(items, $q.value));

        // 表示用：repos.json の更新日時はファイルの Last-Modified から推定
        const lm = res.headers.get("last-modified");
        if(lm) $last.textContent = `Catalog: ${new Date(lm).toISOString().slice(0,10)}`;
      }catch(e){
        $hint.style.display = "block";
      }
    }
    main();
  </script>
</body>
</html>
